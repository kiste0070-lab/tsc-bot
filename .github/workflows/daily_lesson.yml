name: Daily TSC Lesson

on:
  schedule:
    # 매일 한국 시간 오전 11:59 (UTC 02:59)에 실행
    - cron: '59 2 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # MD 파일을 저장소에 푸시하기 위한 권한

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 -> v5 업데이트
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure files exist
        run: touch wrong_notes.md # 파일이 없을 경우 대비

      - name: Run TSC Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCHEDULE_TIME: "12:00"
        run: python main.py --now

      - name: Commit and Push Changes (Wrong Notes)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wrong_notes.md
          # 변경사항이 있을 때만 푸시 (없으면 스킵)
          if ! git diff --cached --quiet; then
            git commit -m "Update wrong notes [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
