name: Daily TSC Lesson

on:
  schedule:
    # 매일 한국 시간 오전 11:59 (UTC 02:59)에 실행
    - cron: '59 2 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # wrong_notes 커밋/푸시에 필요

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gTTS python-telegram-bot google-genai python-dotenv

      - name: Run TSC Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_MODEL_PRIMARY: ${{ secrets.GEMINI_MODEL_PRIMARY || 'gemma-4-31b-it' }}
          GEMINI_MODEL_SECONDARY: ${{ secrets.GEMINI_MODEL_SECONDARY || 'gemini-3.1-flash-lite-preview' }}
        run: python main.py

      - name: Commit and push wrong_notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrong_notes/
          # 변경사항이 없으면 커밋하지 않고 정상 종료
          git diff --cached --quiet && echo "변경사항 없음, 커밋 생략" || \
          git commit -m "📝 오답노트 업데이트: $(date '+%Y-%m-%d')"
          git push
