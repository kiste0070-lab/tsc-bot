name: Daily TSC Lesson

on:
  schedule:
    # 매일 한국 시간 오전 11:59 (UTC 02:59)에 실행
    - cron: '59 2 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # MD 파일을 저장소에 푸시하기 위한 권한

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TSC Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCHEDULE_TIME: "12:00"
        run: python main.py --now

      - name: Commit and Push Changes (Wrong Notes)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wrong_notes.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update wrong notes [skip ci]" && git push)
